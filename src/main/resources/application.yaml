spring:
  application:
    name: service-cp-crime-prosecution-case

server:
  port: ${SERVER_PORT:8082}

azure:
  application-insights:
    instrumentation-key: ${rpe.AppInsightsInstrumentationKey:00000000-0000-0000-0000-000000000000}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true   # enables liveness / readiness groups

logging:
  level:
    root: INFO

prosecution-casefile-client:
  url: ${CP_BACKEND_URL:http://localhost:8081}
  path: /prosecutioncasefile-query-api/query/api/rest/prosecutioncasefile/cases
  cjscppuid: ${CJSCPPUID:00000000-0000-0000-0000-000000000000}

case-mapper-client:
  url: ${AMP_BACKEND_URL:http://localhost:8081}
  path: /urnmapper
